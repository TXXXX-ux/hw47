<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Книга взята</title>
    <link rel="stylesheet" href="css/freemarker.css">
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px; background-color: #f4f4f9;">

<div style="border: 2px solid #4CAF50; display: inline-block; padding: 30px; border-radius: 15px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <h1 style="color: #4CAF50; margin-top: 0;">Успешно!</h1>
    <p style="font-size: 18px;">Вы взяли книгу:<br><strong>${book.title}</strong></p>

    <img src="${book.image}" style="width: 120px; display: block; margin: 15px auto; border-radius: 5px;">

    <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px; align-items: center;">

        <a href="/books" style="background-color: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; width: 200px; text-align: center;">
            Вернуться к книгам
        </a>

        <a href="/book?id=${book.id}" style="background-color: #2196F3; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; width: 200px; text-align: center;">
            Посмотреть описание
        </a>

        <form action="/books/return" method="post" style="margin: 0;">
            <input type="hidden" name="bookId" value="${book.id}">
            <button type="submit" style="background-color: #f44336; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; width: 240px;">
                Передумал, вернуть книгу
            </button>
        </form>

    </div>
</div>

</body>
</html>
